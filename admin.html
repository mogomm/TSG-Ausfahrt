<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admin – Fahrgemeinschaft</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
  :root {
    --orange: #EC6500; --orange-light: #FFF3E8;
    --green: #22C55E; --green-light: #F0FDF4; --green-dark: #166534;
    --red: #EF4444; --red-light: #FEF2F2;
    --gray-50:#F9FAFB; --gray-100:#F3F4F6; --gray-200:#E5E7EB;
    --gray-400:#9CA3AF; --gray-600:#4B5563; --gray-800:#1F2937;
    --radius:12px; --radius-sm:8px;
  }
  * { box-sizing:border-box; margin:0; padding:0; }
  body { font-family:'DM Sans',sans-serif; background:var(--gray-50); color:var(--gray-800); }
  .wrap { max-width:720px; margin:0 auto; padding:0 0 3rem; }

  /* Header */
  .header { background:var(--orange); padding:16px 20px; display:flex; align-items:center; justify-content:space-between; }
  .header-left { display:flex; align-items:center; gap:12px; }
  .header-title { font-size:18px; font-weight:600; color:white; }
  .header-sub { font-size:12px; color:rgba(255,255,255,0.75); }
  .logout-btn { font-size:12px; color:rgba(255,255,255,0.8); background:rgba(255,255,255,0.15); border:none; border-radius:6px; padding:6px 12px; cursor:pointer; font-family:'DM Sans',sans-serif; }
  .logout-btn:hover { background:rgba(255,255,255,0.25); }

  /* Tabs */
  .tabs { display:flex; border-bottom:1px solid var(--gray-200); background:white; padding:0 20px; }
  .tab { font-size:14px; padding:12px 16px; cursor:pointer; border-bottom:2px solid transparent; color:var(--gray-400); font-weight:500; transition:all 0.15s; }
  .tab.active { color:var(--orange); border-bottom-color:var(--orange); }

  /* Content */
  .tab-content { display:none; padding:20px; }
  .tab-content.active { display:block; }

  /* Cards */
  .card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:16px 18px; margin-bottom:16px; }
  .card-title { font-size:15px; font-weight:600; color:var(--gray-800); margin-bottom:12px; display:flex; align-items:center; gap:8px; }

  /* Form */
  .form-row { display:flex; gap:10px; flex-wrap:wrap; margin-bottom:10px; }
  .form-group { flex:1; min-width:140px; }
  label { font-size:12px; color:var(--gray-600); font-weight:500; display:block; margin-bottom:4px; }
  input, select, textarea { width:100%; font-size:13px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); padding:8px 10px; background:white; color:var(--gray-800); font-family:'DM Sans',sans-serif; }
  input:focus, select:focus, textarea:focus { outline:none; border-color:var(--orange); }
  textarea { resize:vertical; }

  /* Buttons */
  .btn { display:inline-flex; align-items:center; gap:6px; font-size:13px; font-weight:500; padding:8px 16px; border-radius:var(--radius-sm); border:none; cursor:pointer; font-family:'DM Sans',sans-serif; transition:opacity 0.15s; }
  .btn-primary { background:var(--orange); color:white; }
  .btn-primary:hover { opacity:0.9; }
  .btn-green { background:var(--green); color:white; }
  .btn-green:hover { opacity:0.9; }
  .btn-outline { background:transparent; border:1px solid var(--gray-200); color:var(--gray-600); }
  .btn-outline:hover { background:var(--gray-100); }
  .btn-red { background:var(--red); color:white; }
  .btn-red:hover { opacity:0.9; }
  .btn-sm { font-size:11px; padding:5px 10px; }
  .btn-full { width:100%; justify-content:center; margin-top:4px; }
  .btn:disabled { opacity:0.5; cursor:default; }

  /* Table */
  .table-wrap { overflow-x:auto; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th { text-align:left; font-size:11px; font-weight:600; color:var(--gray-400); text-transform:uppercase; letter-spacing:0.05em; padding:8px 10px; border-bottom:1px solid var(--gray-200); }
  td { padding:10px; border-bottom:1px solid var(--gray-100); vertical-align:middle; }
  tr:last-child td { border-bottom:none; }
  tr:hover td { background:var(--gray-50); }

  /* Badges */
  .badge { display:inline-block; font-size:10px; font-weight:500; padding:2px 8px; border-radius:4px; }
  .badge-green { background:var(--green-light); color:var(--green-dark); }
  .badge-gray { background:var(--gray-100); color:var(--gray-600); }
  .badge-orange { background:var(--orange-light); color:var(--orange); }
  .badge-blue { background:#EFF6FF; color:#1D4ED8; }
  .badge-red { background:var(--red-light); color:#991B1B; }

  /* Link pill */
  .link-pill { font-family:'DM Mono',monospace; font-size:10px; background:var(--gray-100); border:1px solid var(--gray-200); border-radius:4px; padding:3px 8px; color:var(--gray-600); cursor:pointer; white-space:nowrap; }
  .link-pill:hover { background:var(--orange-light); color:var(--orange); border-color:var(--orange); }

  /* Lineup checkboxes */
  .lineup-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(180px,1fr)); gap:6px; }
  .lineup-item { display:flex; align-items:center; gap:8px; padding:8px 10px; border:1px solid var(--gray-200); border-radius:var(--radius-sm); cursor:pointer; font-size:13px; }
  .lineup-item:hover { background:var(--gray-50); }
  .lineup-item input { width:auto; }

  /* Status game */
  .game-status-row { display:flex; gap:8px; flex-wrap:wrap; align-items:center; margin-top:10px; }

  /* Toast */
  .toast { position:fixed; bottom:24px; right:24px; background:var(--gray-800); color:white; padding:10px 16px; border-radius:var(--radius-sm); font-size:13px; opacity:0; transition:all 0.25s; pointer-events:none; z-index:99; }
  .toast.show { opacity:1; }

  /* Login */
  .login-wrap { max-width:360px; margin:80px auto; padding:0 20px; }
  .login-card { background:white; border-radius:var(--radius); border:1px solid var(--gray-200); padding:32px; text-align:center; }
  .login-logo { font-size:40px; margin-bottom:16px; }
  .login-title { font-size:20px; font-weight:600; margin-bottom:4px; }
  .login-sub { font-size:13px; color:var(--gray-400); margin-bottom:24px; }

  /* WA text */
  .wa-box { background:var(--gray-50); border:1px solid var(--gray-200); border-radius:var(--radius-sm); padding:12px; font-size:12px; color:var(--gray-600); white-space:pre-wrap; line-height:1.7; font-family:'DM Mono',monospace; margin-top:10px; }

  /* Result groups */
  .result-group { padding:12px; border-radius:var(--radius-sm); border:1px solid; margin-bottom:8px; }
  .result-title { font-size:13px; font-weight:600; margin-bottom:4px; }
  .result-body { font-size:12px; line-height:1.7; }

  .spinner { display:inline-block; width:14px; height:14px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.7s linear infinite; }
  @keyframes spin { to { transform:rotate(360deg); } }

  .error { padding:10px 12px; background:var(--red-light); border-radius:var(--radius-sm); font-size:13px; color:#991B1B; margin-bottom:10px; }
  .success { padding:10px 12px; background:var(--green-light); border-radius:var(--radius-sm); font-size:13px; color:var(--green-dark); margin-bottom:10px; }
</style>
</head>
<body>

<!-- Login screen -->
<div class="login-wrap" id="login-screen">
  <div class="login-card">
    <div class="login-logo">⚽</div>
    <div class="login-title">Admin-Bereich</div>
    <div class="login-sub">Fahrgemeinschaft</div>
    <div class="form-group" style="text-align:left;margin-bottom:12px">
      <label>Passwort</label>
      <input type="password" id="pw-input" placeholder="Admin-Passwort" onkeydown="if(event.key==='Enter')login()">
    </div>
    <div id="login-err" class="error" style="display:none"></div>
    <button class="btn btn-primary btn-full" onclick="login()">Einloggen</button>
  </div>
</div>

<!-- Main admin app -->
<div class="wrap" id="admin-app" style="display:none">
  <div class="header">
    <div class="header-left">
      <div>
        <div class="header-title">⚽ Admin</div>
        <div class="header-sub">Fahrgemeinschaft</div>
      </div>
    </div>
    <button class="logout-btn" onclick="logout()">Ausloggen</button>
  </div>

  <div class="tabs">
    <div class="tab active" onclick="switchTab('spieler')">Spieler</div>
    <div class="tab" onclick="switchTab('spiel')">Spiel</div>
    <div class="tab" onclick="switchTab('gruppen')">Gruppen</div>
  </div>

  <!-- TAB: Spieler -->
  <div class="tab-content active" id="tab-spieler">
    <div class="card">
      <div class="card-title">➕ Spieler hinzufügen</div>
      <div class="form-row">
        <div class="form-group"><label>Name</label><input id="p-name" placeholder="Jonas M."></div>
        <div class="form-group"><label>Adresse</label><input id="p-addr" placeholder="Rheinstr. 12, Darmstadt"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Telefon (Eltern)</label><input id="p-phone" placeholder="0151-..."></div>
        <div class="form-group"><label>Auto vorhanden?</label>
          <select id="p-car"><option value="1">Ja</option><option value="0">Nein</option></select>
        </div>
      </div>
      <div id="add-err" class="error" style="display:none"></div>
      <button class="btn btn-primary" id="add-btn" onclick="addPlayer()">Spieler hinzufügen</button>
    </div>

    <div class="card">
      <div class="card-title">👥 Alle Spieler <span id="player-count" style="font-size:12px;color:var(--gray-400);font-weight:400"></span></div>
      <div class="table-wrap">
        <table>
          <thead><tr><th>Name</th><th>Adresse</th><th>Auto</th><th>Magic-Link</th><th></th></tr></thead>
          <tbody id="players-table"></tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- TAB: Spiel -->
  <div class="tab-content" id="tab-spiel">
    <div class="card">
      <div class="card-title">🏟️ Neues Spiel anlegen</div>
      <div class="form-row">
        <div class="form-group"><label>Gegner / Ort</label><input id="g-name" placeholder="SV Eintracht Griesheim"></div>
        <div class="form-group"><label>Adresse Spielort</label><input id="g-addr" placeholder="Griesheimer Weg 45, Griesheim"></div>
      </div>
      <div class="form-row">
        <div class="form-group"><label>Datum & Anstoß</label><input type="datetime-local" id="g-date"></div>
        <div class="form-group"><label>Anmeldeschluss</label><input type="datetime-local" id="g-deadline"></div>
      </div>
      <div class="form-group" style="margin-bottom:12px">
        <label>Aufstellung (Spieler auswählen)</label>
        <div class="lineup-grid" id="lineup-grid" style="margin-top:8px"></div>
      </div>
      <div id="game-err" class="error" style="display:none"></div>
      <button class="btn btn-primary" id="game-btn" onclick="createGame()">Spiel speichern</button>
    </div>

    <div class="card" id="current-game-card" style="display:none">
      <div class="card-title">📋 Aktuelles Spiel</div>
      <div id="current-game-info"></div>
      <div class="game-status-row" id="game-actions"></div>
    </div>
  </div>

  <!-- TAB: Gruppen -->
  <div class="tab-content" id="tab-gruppen">
    <div class="card">
      <div class="card-title">🚗 Rückmeldungen</div>
      <div id="rsvp-overview"></div>
    </div>
    <div class="card">
      <div class="card-title">🗂️ Fahrgemeinschaften</div>
      <div id="groups-result"></div>
      <div class="game-status-row" style="margin-top:12px">
        <button class="btn btn-primary" id="calc-btn" onclick="calculate()">Gruppen berechnen</button>
        <button class="btn btn-green" id="publish-btn" onclick="publishGroups()" style="display:none">Ergebnis veröffentlichen</button>
      </div>
      <div id="wa-section" style="display:none">
        <div style="font-size:12px;color:var(--gray-400);margin-top:12px;margin-bottom:4px">WhatsApp-Text:</div>
        <div class="wa-box" id="wa-text"></div>
        <button class="btn btn-outline btn-sm" style="margin-top:8px" onclick="copyWA()">Kopieren</button>
      </div>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
const API = window.location.hostname === 'localhost' ? 'http://localhost:3000/api' : '/api';
let adminToken = localStorage.getItem('admin_token') || '';
let players = [], currentGame = null, lineup = [], rsvps = [], assignments = [];

const GROUP_COLORS = [
  { bg:'#FFF7ED', border:'#FCD34D', title:'#92400E' },
  { bg:'#F0FDF4', border:'#86EFAC', title:'#15803D' },
  { bg:'#EFF6FF', border:'#93C5FD', title:'#1D4ED8' },
  { bg:'#F5F3FF', border:'#C4B5FD', title:'#6D28D9' },
];

function toast(msg, ok=true) {
  const t = document.getElementById('toast');
  t.textContent = msg; t.style.background = ok ? '#1F2937' : '#EF4444';
  t.classList.add('show'); setTimeout(()=>t.classList.remove('show'), 2500);
}

async function api(path, method='GET', body) {
  const opts = { method, headers: { 'Content-Type':'application/json', 'Authorization':'Bearer '+adminToken } };
  if (body) opts.body = JSON.stringify(body);
  const r = await fetch(API+path, opts);
  const data = await r.json();
  if (!r.ok) throw new Error(data.error || 'Fehler');
  return data;
}

async function login() {
  const pw = document.getElementById('pw-input').value;
  try {
    await api('/admin/login','POST',{ password:pw });
    adminToken = btoa(pw);
    localStorage.setItem('admin_token', adminToken);
    showApp();
  } catch(e) {
    const el = document.getElementById('login-err');
    el.textContent = 'Falsches Passwort'; el.style.display='block';
  }
}

function logout() {
  localStorage.removeItem('admin_token');
  adminToken = '';
  document.getElementById('login-screen').style.display='block';
  document.getElementById('admin-app').style.display='none';
}

async function showApp() {
  document.getElementById('login-screen').style.display='none';
  document.getElementById('admin-app').style.display='block';
  await loadAll();
}

async function loadAll() {
  [players] = await Promise.all([ api('/players') ]);
  renderPlayersTable();
  renderLineupGrid();
  try {
    currentGame = await api('/games/current');
    if (currentGame) {
      lineup = await api(`/games/${currentGame.id}/lineup`);
      rsvps = await api(`/games/${currentGame.id}/rsvps`);
      assignments = await api(`/games/${currentGame.id}/assignments`);
      renderCurrentGame();
      renderRsvpOverview();
      renderGroupsResult();
    }
  } catch(e) { currentGame = null; }
}

function switchTab(name) {
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',['spieler','spiel','gruppen'][i]===name));
  document.querySelectorAll('.tab-content').forEach(c=>c.classList.remove('active'));
  document.getElementById('tab-'+name).classList.add('active');
}

// ── Players ──────────────────────────────────────────────────────────
function renderPlayersTable() {
  document.getElementById('player-count').textContent = `(${players.length})`;
  const tbody = document.getElementById('players-table');
  if (!players.length) { tbody.innerHTML='<tr><td colspan="5" style="color:var(--gray-400);text-align:center;padding:20px">Noch keine Spieler</td></tr>'; return; }
  tbody.innerHTML = players.map(p => `
    <tr>
      <td style="font-weight:500">${p.name}</td>
      <td style="color:var(--gray-600)">${p.address}</td>
      <td><span class="badge ${p.has_car?'badge-green':'badge-gray'}">${p.has_car?'🚗 Ja':'Nein'}</span></td>
      <td><span class="link-pill" onclick="copyLink('${p.magic_token}','${p.name}')" title="Link kopieren">
        /player?token=${p.magic_token.slice(0,8)}…
      </span></td>
      <td><button class="btn btn-outline btn-sm" onclick="deletePlayer('${p.id}','${p.name}')">✕</button></td>
    </tr>`).join('');
}

function renderLineupGrid() {
  const selectedIds = new Set((lineup||[]).map(p=>p.id));
  document.getElementById('lineup-grid').innerHTML = players.map(p=>`
    <label class="lineup-item">
      <input type="checkbox" value="${p.id}" ${selectedIds.has(p.id)?'checked':''}>
      ${p.name} ${p.has_car?'🚗':''}
    </label>`).join('');
}

async function addPlayer() {
  const name=document.getElementById('p-name').value.trim();
  const address=document.getElementById('p-addr').value.trim();
  const phone=document.getElementById('p-phone').value.trim();
  const has_car=document.getElementById('p-car').value==='1';
  const errEl = document.getElementById('add-err');
  errEl.style.display='none';
  if(!name||!address){ errEl.textContent='Name und Adresse erforderlich'; errEl.style.display='block'; return; }
  const btn=document.getElementById('add-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Geocodiere Adresse…';
  try {
    await api('/players','POST',{name,address,phone,has_car});
    document.getElementById('p-name').value='';
    document.getElementById('p-addr').value='';
    document.getElementById('p-phone').value='';
    await loadAll();
    toast(`✓ ${name} hinzugefügt`);
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  btn.disabled=false; btn.textContent='Spieler hinzufügen';
}

async function deletePlayer(id, name) {
  if(!confirm(`${name} wirklich löschen?`)) return;
  await api(`/players/${id}`,'DELETE');
  await loadAll(); toast(`${name} gelöscht`);
}

function copyLink(token, name) {
  const url = `${window.location.origin}/?token=${token}`;
  navigator.clipboard?.writeText(url);
  toast(`✓ Link für ${name} kopiert`);
}

// ── Game ──────────────────────────────────────────────────────────────
async function createGame() {
  const name=document.getElementById('g-name').value.trim();
  const addr=document.getElementById('g-addr').value.trim();
  const date=document.getElementById('g-date').value;
  const deadline=document.getElementById('g-deadline').value;
  const errEl=document.getElementById('game-err');
  errEl.style.display='none';
  if(!name||!addr||!date){ errEl.textContent='Bitte alle Pflichtfelder ausfüllen'; errEl.style.display='block'; return; }
  const player_ids=[...document.querySelectorAll('#lineup-grid input:checked')].map(i=>i.value);
  const btn=document.getElementById('game-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Geocodiere…';
  try {
    await api('/games','POST',{ destination_name:name, destination_address:addr, date, rsvp_deadline:deadline||null, player_ids });
    await loadAll(); toast('✓ Spiel gespeichert'); switchTab('spiel');
  } catch(e) { errEl.textContent=e.message; errEl.style.display='block'; }
  btn.disabled=false; btn.textContent='Spiel speichern';
}

function renderCurrentGame() {
  if(!currentGame) { document.getElementById('current-game-card').style.display='none'; return; }
  document.getElementById('current-game-card').style.display='block';
  const statusBadge = {open:'badge-orange',calculated:'badge-blue',published:'badge-green',archived:'badge-gray'}[currentGame.status]||'badge-gray';
  const statusLabel = {open:'Offen',calculated:'Berechnet',published:'Veröffentlicht',archived:'Archiviert'}[currentGame.status]||currentGame.status;
  const d=new Date(currentGame.date);
  document.getElementById('current-game-info').innerHTML=`
    <div style="font-size:15px;font-weight:600">${currentGame.destination_name}</div>
    <div style="font-size:13px;color:var(--gray-600);margin-top:2px">${currentGame.destination_address}</div>
    <div style="font-size:13px;color:var(--gray-600);margin-top:4px">${d.toLocaleDateString('de-DE',{weekday:'long',day:'numeric',month:'long'})} · ${d.toLocaleTimeString('de-DE',{hour:'2-digit',minute:'2-digit'})} Uhr</div>
    <div style="margin-top:8px"><span class="badge ${statusBadge}">${statusLabel}</span>
    <span style="font-size:12px;color:var(--gray-400);margin-left:8px">${lineup.length} Spieler in der Aufstellung</span></div>`;

  const actions=document.getElementById('game-actions');
  actions.innerHTML='';
  if(currentGame.status==='open'){
    actions.innerHTML=`<button class="btn btn-outline" onclick="archiveGame()">Spiel archivieren</button>`;
  } else if(currentGame.status==='published') {
    actions.innerHTML=`<button class="btn btn-outline" onclick="archiveGame()">Archivieren</button>`;
  }
}

async function archiveGame() {
  await api(`/games/${currentGame.id}`,'PATCH',{status:'archived'});
  await loadAll(); toast('Spiel archiviert');
}

// ── RSVPs ──────────────────────────────────────────────────────────────
function renderRsvpOverview() {
  if(!currentGame || !lineup.length){ document.getElementById('rsvp-overview').innerHTML='<div style="color:var(--gray-400);font-size:13px">Kein aktives Spiel</div>'; return; }
  const rsvpMap=Object.fromEntries(rsvps.map(r=>[r.player_id,r]));
  const rows=lineup.map(p=>{
    const r=rsvpMap[p.id]||{mode:'pending'};
    const badge={
      driving:`<span class="badge badge-green">🚗 fährt · ${r.seats_available||2} Plätze</span>`,
      riding:`<span class="badge badge-blue">🙋 sucht ${r.seats_needed||1} Platz</span>`,
      pending:`<span class="badge badge-gray">– offen</span>`
    }[r.mode];
    return `<tr>
      <td style="font-weight:500">${p.name}</td>
      <td>${badge}</td>
      <td style="font-size:12px;color:var(--gray-400);font-style:italic">${r.note||''}</td>
    </tr>`;
  });
  document.getElementById('rsvp-overview').innerHTML=`<div class="table-wrap"><table>
    <thead><tr><th>Spieler</th><th>Status</th><th>Notiz</th></tr></thead>
    <tbody>${rows.join('')}</tbody>
  </table></div>`;
}

// ── Groups ──────────────────────────────────────────────────────────────
async function calculate() {
  if(!currentGame){ toast('Kein aktives Spiel',false); return; }
  const btn=document.getElementById('calc-btn');
  btn.disabled=true; btn.innerHTML='<span class="spinner"></span> Berechne…';
  try {
    assignments=await api(`/games/${currentGame.id}/calculate`,'POST');
    currentGame=await api('/games/current');
    renderGroupsResult();
    renderCurrentGame();
    toast('✓ Gruppen berechnet');
    document.getElementById('publish-btn').style.display='inline-flex';
    document.getElementById('wa-section').style.display='block';
  } catch(e){ toast(e.message,false); }
  btn.disabled=false; btn.textContent='Gruppen berechnen';
}

async function publishGroups() {
  await api(`/games/${currentGame.id}/publish`,'POST');
  currentGame.status='published';
  renderCurrentGame(); toast('✓ Ergebnis veröffentlicht – alle Eltern sehen es jetzt!');
}

function renderGroupsResult() {
  if(!assignments.length){ document.getElementById('groups-result').innerHTML='<div style="color:var(--gray-400);font-size:13px">Noch nicht berechnet</div>'; return; }
  const playerMap=Object.fromEntries([...players,...lineup].map(p=>[p.id,p]));
  let html='', wa='⚽ Fahrgemeinschaften\n';
  if(currentGame) wa+=`${currentGame.destination_name} · ${new Date(currentGame.date).toLocaleDateString('de-DE')}\n\n`;

  assignments.forEach((a,i)=>{
    const col=GROUP_COLORS[i%GROUP_COLORS.length];
    const driver=playerMap[a.driver_player_id];
    const riders=(a.rider_player_ids||[]).map(id=>playerMap[id]?.name).filter(Boolean).join(', ')||'–';
    const dist=a.direct_dist_km?` · ${a.direct_dist_km} km`:'' ;
    html+=`<div class="result-group" style="background:${col.bg};border-color:${col.border}">
      <div class="result-title" style="color:${col.title}">Gruppe ${i+1} · Fahrer: ${driver?.name||'?'}</div>
      <div class="result-body">
        Mitfahrer: <b>${riders}</b><br>
        Treffpunkt: <b>${a.meetup_address}</b>
        ${a.meetup_type==='at_driver'?' (Mitfahrer kommen zum Fahrer)':' (Fahrer sammelt ein)'}${dist}
      </div>
    </div>`;
    wa+=`Gruppe ${i+1}: ${driver?.name||'?'} fährt\nMitfahrer: ${riders}\nTreffpunkt: ${a.meetup_address}\n\n`;
  });

  document.getElementById('groups-result').innerHTML=html;
  document.getElementById('wa-text').textContent=wa.trim();
  document.getElementById('publish-btn').style.display = currentGame?.status==='calculated'?'inline-flex':'none';
  document.getElementById('wa-section').style.display = assignments.length?'block':'none';
}

function copyWA() {
  navigator.clipboard?.writeText(document.getElementById('wa-text').textContent);
  toast('✓ WhatsApp-Text kopiert');
}

// ── Init ──────────────────────────────────────────────────────────────
(async () => {
  if(adminToken) {
    try {
      const v = await api('/admin/verify');
      if(v.ok) { showApp(); return; }
    } catch(e) {}
    localStorage.removeItem('admin_token'); adminToken='';
  }
  document.getElementById('login-screen').style.display='block';
})();
</script>
